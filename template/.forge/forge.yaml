version: 1
harness:
  name: forge
  installed_at: "<INSTALLED_AT>"
  template_version: "0.1.0-dev"
  # Active adapters for THIS repo (chosen at /forge:init, reconciled by sync-adapters).
  # Available adapters are the declarations in .forge/adapters/*.yaml; only the ones listed
  # here are materialized. Default is claude; add others via /forge:sync-adapters --set.
  adapters:
    - claude
specs:
  root: .forge/specs
  active: .forge/specs/active
  archived: .forge/specs/archived
  baseline: .forge/product/current
graph:
  enabled: true
  root: .forge/graph
quality:
  enabled: false
  evals_root: .forge/evals
  runners: .forge/runners.yaml
  require_tests_before_archive: true
  require_traceability_before_archive: true
  require_human_approval_before_archive: true
handoff:
  # Quando true, sync-adapters liga hooks SessionStart/SessionEnd no settings.json do adapter
  # ativo: regeneram e injetam o .forge/HANDOFF.md automaticamente (rule-based, sem LLM). Default off.
  auto: false
ledger:
  # Ledger durável de projeto (roadmap & dívida técnica) em .forge/ledger/. Store NÃO-BLOQUEANTE de
  # trabalho conhecido que sobrevive entre changes; alimentado por captura automática (harvest de
  # deferrals/findings no close/archive) + /forge:ledger. Ver rules/conventions/ledger-consultation.md.
  # Quando true, o hook SessionStart também lista os itens open de maior prioridade (rule-based, sem
  # LLM), como o handoff.auto. A captura automática no close/archive independe deste flag. Default off.
  auto: false
autonomy:
  # Modo de decisão nos gates HITL (§12.1). Ver rules/conventions/autonomy-yolo.md.
  #   hitl (default): gates de aprovação param para decisão humana via AskUserQuestion.
  #   yolo: gates de aprovação são decididos por um subagente Opus effort high (agent
  #         yolo-gate), registrados em approvals.yaml com autonomous:true — NUNCA mascarados
  #         como decisão humana. Falhas de execução ([!], blockers, conflito de fontes) NÃO
  #         são gates: continuam parando (yolo decide gates, não mascara falhas).
  mode: hitl
  # Decisor autônomo dos gates (alto critério por design).
  gate_agent:
    model: opus
    effort: high
  # Gates de APROVAÇÃO que permanecem humanos mesmo em yolo (domínio regulado/financeiro —
  # §12.1/§13.1 exigem aprovação humana explícita p/ mutação de baseline). Esvazie ([]) para
  # yolo total desassistido, assumindo o risco de auditoria.
  human_hard_stops:
    - human_archive_approval
  # Ações IRREVERSÍVEIS de alto risco nunca auto-aprovadas em yolo (produção/dados),
  # independentemente de mode. Continuam exigindo confirmação humana explícita.
  irreversible_hard_stops:
    - deploy_prd
    - promote_staging
    - adapter_removal
    - branch_cleanup

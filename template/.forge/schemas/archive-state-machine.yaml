# Canonical spec lifecycle definition (doc §10.7 + §12; validated by
# archive-state-machine.schema.json). Scripts implement these exact rules:
# spec-transition.sh (chain + blocked), spec-close.sh (abandoned/rejected/
# superseded), archive-spec.sh (archived). v1.1 closes plan gap L3: 'rejected'
# is reachable from every review-gated state (proposed..tasks-ready), like
# 'abandoned'.
states:
  - name: idea
    kind: chain
  - name: proposed
    kind: chain
    requires: "proposal.md exists"
  - name: requirements-ready
    kind: chain
    requires: "requirements.md or bugfix.md/refactor.md without NEEDS CLARIFICATION"
  - name: design-ready
    kind: chain
    requires: "design.md exists and passes its validator"
  - name: tasks-ready
    kind: chain
    requires: "tasks.md complete, ordered and traceable"
  - name: implementing
    kind: chain
    requires: "at least one task in progress"
  - name: implemented
    kind: chain
    requires: "all tasks done"
  - name: verified
    kind: chain
    requires: "checks/evidence recorded in verification.md + verification.yaml"
  - name: archived
    kind: terminal
    requires: "deltas applied to baseline and folder moved to archived"
  - name: blocked
    kind: lateral
    requires: "blocking cause recorded"
  - name: abandoned
    kind: terminal
    requires: "closed without implementation and without baseline update"
  - name: rejected
    kind: terminal
    requires: "reviewed and refused"
  - name: superseded
    kind: terminal
    requires: "replaced by another spec/change"
  - name: reopened
    kind: lateral
    requires: "reason + affected baseline + corrective spec or rollback"
  - name: rolled-back
    kind: terminal
    requires: "archive formally reverted in the baseline"

transitions:
  # main chain (scale-adaptive skips per §10.3)
  - { from: idea, to: proposed, via: spec-transition }
  - { from: proposed, to: requirements-ready, via: spec-transition, gate: requirements_reviewed, scale_skippable: true }
  - { from: requirements-ready, to: design-ready, via: spec-transition, gate: design_reviewed, scale_skippable: true }
  - { from: design-ready, to: tasks-ready, via: spec-transition, gate: tasks_reviewed }
  - { from: tasks-ready, to: implementing, via: spec-transition }
  - { from: implementing, to: implemented, via: spec-transition }
  - { from: implemented, to: verified, via: spec-transition, gate: implementation_verified }
  - { from: verified, to: archived, via: archive, gate: human_archive_approval }
  # close without baseline update (§13; pre-implementing only, except superseded)
  - { from: proposed, to: abandoned, via: close, requires_reason: true }
  - { from: requirements-ready, to: abandoned, via: close, requires_reason: true }
  - { from: design-ready, to: abandoned, via: close, requires_reason: true }
  - { from: tasks-ready, to: abandoned, via: close, requires_reason: true }
  - { from: proposed, to: rejected, via: close, requires_reason: true }
  - { from: requirements-ready, to: rejected, via: close, requires_reason: true }
  - { from: design-ready, to: rejected, via: close, requires_reason: true }
  - { from: tasks-ready, to: rejected, via: close, requires_reason: true }
  - { from: any, to: superseded, via: close, requires_reason: true }
  # laterals
  - { from: any, to: blocked, via: spec-transition, requires_reason: true }
  - { from: blocked, to: any, via: spec-transition, requires_reason: true }
  # post-archive (MVP3+; manual = formal human procedure)
  - { from: archived, to: reopened, via: manual, requires_reason: true }
  - { from: archived, to: rolled-back, via: manual, requires_reason: true }
